apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: entrypoint-balancer
  name: entrypoint-balancer
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: entrypoint-balancer
  template:
    metadata:
      labels:
        app.kubernetes.io/component: entrypoint-balancer
    spec:
      containers:
        - name: entrypoint-balancer
          image: eclipseaerios/entrypoint-balancer:1.3.0
          ports:
            - containerPort: 8080
              name: api
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: DEBUG
            - name: SECURITY_LOG_LEVEL
              value: DEBUG
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: entrypoint-balancer
  name: entrypoint-balancer
  namespace: default
spec:
  type: NodePort
  ports:
    - name: api
      port: 8080
      protocol: TCP
      targetPort: 8080
  selector:
    app.kubernetes.io/component: entrypoint-balancer
